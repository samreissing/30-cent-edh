name: Sync data + deploy site

on:
  schedule:
    # 06:00 UTC daily ≈ 02:00 ET. After Scryfall's nightly price refresh.
    - cron: "0 6 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "pipeline/**"
      - "web/**"
      - ".github/workflows/sync-and-deploy.yml"

permissions:
  contents: write   # to commit data/*.json
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - run: pip install -r pipeline/requirements.txt

      - name: Pull Google Sheet
        run: python pipeline/pull_sheet.py

      - name: Cache Scryfall bulk dump
        uses: actions/cache@v4
        with:
          path: pipeline/scryfall_bulk.json
          # Cache key rotates daily so we get fresh prices.
          key: scryfall-bulk-${{ github.run_id }}
          restore-keys: |
            scryfall-bulk-

      - name: Download Scryfall bulk (if stale)
        run: python pipeline/fetch_scryfall.py

      - name: Enrich cardpool
        run: python pipeline/enrich.py

      - name: Commit data changes
        id: commit
        run: |
          git config user.name "20w30c-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No data changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "data: nightly sync $(date -u +%Y-%m-%d)"
          # Race: a human may have pushed to main while the action was running.
          # Rebase and retry a few times before failing the job.
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "changed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "push attempt $attempt rejected; rebasing on origin/main..."
            git fetch origin main
            git rebase origin/main
          done
          echo "Could not push data commit after 5 attempts." >&2
          exit 1

  build:
    needs: sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main  # pick up the data commit the sync job just pushed

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci
        working-directory: web

      - name: Build static site
        working-directory: web
        env:
          BASE_PATH: /${{ github.event.repository.name }}
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
